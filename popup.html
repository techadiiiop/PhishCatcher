<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhishCatcher</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>🛡️ PhishCatcher</h2>
    </div>
    <div class="status" id="statusBadge">
      <span class="badge active">🟢 Active</span>
    </div>
    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="totalAnalyzed">0</span>
        <span class="stat-label">Websites Analyzed</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="totalThreats">0</span>
        <span class="stat-label">Threats Detected</span>
      </div>
    </div>
    <div class="current-info" id="currentInfo">
      <p id="currentUrl">Loading...</p>
      <div class="confidence-bar">
        <div class="confidence-fill" id="confidenceFill" style="width: 0%;"></div>
      </div>
      <p id="verdict">No analysis yet</p>
    </div>
    <button id="scanBtn" class="btn-primary">🔄 Scan Current Page</button>
    <div class="footer">
      <small>Powered by Multimodal AI</small>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
